<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | IHEC</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <!-- PWA Settings -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="assets/icon.png">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>
<body>

    <div class="dashboard-container">
        <div class="login-card">
        <h1 id="welcomeUser" style="margin-bottom: 5px; font-weight: 700; color: var(--text-main);">...</h1>
        <p class="subtitle" id="userRole" data-i18n="employee">فەرمانبەر</p>

        <div class="status-card">
            <div id="liveClock" class="clock-display">00:00:00</div>
            <div id="liveDate" class="date-display" data-i18n="clockLoading">باردەکرێت...</div>
            
            <div id="checkInInfo" class="arrival-badge" style="display: none; margin-top: 10px;">
                <i class="fas fa-sign-in-alt"></i> <span data-i18n="arrival">هاتن</span>: <span id="arrivalTime">--:--</span>
            </div>
        </div>

        <div class="location-card-mini" id="locationBox">
            <div class="verification-grid">
                <div id="deviceVerify" class="verify-item">
                    <div class="item-header">
                        <i class="fas fa-mobile-alt main-icon"></i>
                        <span class="item-title" data-i18n="device">ئامێر</span>
                    </div>
                    <div class="status-message">
                        <span class="status-text" data-i18n="verifying">پشکنین...</span>
                        <span class="status-icon"><i class="fas fa-circle-notch fa-spin"></i></span>
                    </div>
                </div>
                <div id="locationVerify" class="verify-item">
                    <div class="item-header">
                        <i class="fas fa-map-marker-alt main-icon"></i>
                        <span class="item-title" data-i18n="location">لۆکەیشن</span>
                    </div>
                    <div class="status-message">
                        <span class="status-text" data-i18n="verifying">پشکنین...</span>
                        <span class="status-icon"><i class="fas fa-circle-notch fa-spin"></i></span>
                    </div>
                </div>
            </div>
            <div id="accuracyArea" style="text-align: center; margin-top: 10px; font-size: 0.75rem; color: var(--text-sub);"></div>
            <button id="refreshLocBtn" onclick="manualRefreshLocation()" style="display: none; margin: 10px auto 0 auto; background: var(--primary); color: white; border: none; border-radius: 20px; padding: 6px 18px; cursor: pointer; font-size: 0.8rem;" data-i18n="retryBtn">
                <i class="fas fa-sync-alt"></i> دووبارە پشکنین
            </button>
        </div>

        <button class="checkin-btn" id="checkinBtn" disabled onclick="askConfirmation('in')">
            <i class="fas fa-fingerprint"></i>
            <span id="checkinText" data-i18n="checkin">ئامادەبووم</span>
        </button>

        <button class="checkin-btn checkout-active" id="checkoutBtn" style="display: none;" onclick="askConfirmation('out')">
             <i class="fas fa-sign-out-alt"></i> <span data-i18n="checkout">تۆمارکردنی دەرچوون</span>
        </button>

        <div id="error-msg"></div>

        <button class="checkin-btn history-btn" id="calendarToggleBtn" onclick="toggleCalendar()" style="font-size: 0.9rem; padding: 10px; box-shadow: none;">
            <i class="fas fa-calendar-alt"></i> <span data-i18n="history">مێژووی هاتن و دەرچوونەکانت</span>
        </button>

        <div id="calendarWrapper" style="display: none;">
            <div class="calendar-container">
                <div class="calendar-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                    <button onclick="changeMonth(-1)" class="icon-btn" style="padding: 4px 8px; font-size: 0.8rem;">❮</button>
                    <h3 id="monthDisplay" style="font-size: 0.9rem; margin: 0; color: var(--text-main);" data-i18n="month">مانگ</h3>
                    <button onclick="changeMonth(1)" class="icon-btn" style="padding: 4px 8px; font-size: 0.8rem;">❯</button>
                </div>
                <div class="calendar-grid" id="calendarGrid"></div>
            </div>
        </div>
        </div>
    </div>

    <!-- Confirmation Modal -->
    <div id="confirmModal" class="modal-overlay" style="display: none;">
        <div class="modal-window" style="max-width: 320px;">
            <div class="modal-icon" style="color: var(--primary); font-size: 2rem; margin-bottom: 10px;">
                <i class="fas fa-question-circle"></i>
            </div>
            <h3 id="confirmTitle" style="font-size: 1.1rem; margin-bottom: 10px;" data-i18n="confirmTitle">دڵنیایت؟</h3>
            <p id="confirmMsg" style="font-size: 0.9rem; color: var(--text-sub);" data-i18n="confirmMsg">ئایا دەتەوێت ئەم کردارە ئەنجام بدەیت؟</p>
            <div class="confirm-btn-group">
                <button onclick="closeConfirm()" class="checkin-btn btn-secondary" style="box-shadow: none;" data-i18n="no">نەخێر</button>
                <button id="executeBtn" onclick="executeConfirmedAction()" class="checkin-btn btn-confirm" style="margin: 0;" data-i18n="yes">
                    بەڵێ، دڵنیام
                </button>
            </div>
        </div>
    </div>

    <div id="dayDetails" class="modal-overlay" onclick="closeModal(event)">
        <div class="modal-window">
            <div class="modal-icon"><i class="fas fa-history"></i></div>
            <h4 id="detailDate" data-i18n="date">ڕێکەوت</h4>
            <div class="modal-content-area">
                <div id="detailIn" class="detail-text"></div>
                <div id="detailOut" class="detail-text"></div>
            </div>
            <button onclick="document.getElementById('dayDetails').style.display='none'" class="checkin-btn" style="margin-top: 15px; box-shadow: none;" data-i18n="close">
                داخستن
            </button>
        </div>
    </div>

    <!-- Update Modal -->
    <div id="updateModal" class="modal-overlay" style="display: none;">
        <div class="modal-window update-card">
            <div class="update-header">
                <div class="update-icon-wrapper">
                    <i class="fas fa-wand-magic-sparkles fa-beat-low"></i>
                </div>
            </div>
            <div class="update-body">
                <h3 data-i18n="updateTitle" style="margin-bottom: 12px; font-size: 1.4rem;">وەشانی نوێ</h3>
                <p data-i18n="updateMsg" style="margin-bottom: 25px; font-size: 0.95rem; color: var(--text-sub); line-height: 1.6;"></p>
                <button class="login-btn update-btn" onclick="forceUpdateApp()">
                    <i class="fas fa-bolt"></i> <span data-i18n="updateBtn">نوێکردنەوە</span>
                </button>
            </div>
        </div>
    </div>
     <!-- Modern PWA Install Prompt -->
    <div id="pwaBanner" class="pwa-banner">
        <div class="pwa-handle"></div>
        <button class="pwa-close-btn" onclick="hidePwaPrompt()"><i class="fas fa-times"></i></button>
        <div class="pwa-content">
            <img src="assets/icon.png" class="pwa-icon">
            <div style="flex: 1;">
                <h4 data-i18n="pwaTitle" style="margin-bottom: 4px;">ئەپەکە دابەزێنە</h4>
                <p data-i18n="pwaDesc" style="font-size: 0.8rem; color: var(--text-sub);"></p>
            </div>
        </div>
        <button id="pwaInstallBtn" class="login-btn" style="width: 100%; max-width: 400px;">
            <i class="fas fa-download"></i> <span data-i18n="pwaInstall">دابەزاندن</span>
        </button>
        <div id="pwaIosHint" class="pwa-ios-hint" style="display: none;" data-i18n="pwaIOSMsg"></div>
    </div>

    <div class="top-controls">
        <button class="logout-btn" onclick="handleLogout()" id="logoutBtn" title="چوونە دەرەوە" data-i18n="logout">
            <i class="fas fa-sign-out-alt"></i> چوونە دەرەوە
        </button>
        <button class="icon-btn theme-toggle-btn" onclick="toggleTheme()" id="themeBtn" title="Change Theme">🌙</button>
    </div>

    <script src="lang.js"></script>
    <script src="dashboard.js"></script>
    <script src="script.js"></script>
</body>
</html>
