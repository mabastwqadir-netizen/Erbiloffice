<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | IHEC</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <!-- PWA Settings -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="assets/icon.png">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>
<body>

    <div class="dashboard-container">
        <div class="login-card">
            <div class="employee-profile-card">
                <h2 id="welcomeUser">...</h2>
                <p id="userRole">...</p>
            </div>

        <div class="status-card">
            <div id="liveClock" class="clock-display">00:00:00</div>
            <div id="liveDate" class="date-display" data-i18n="clockLoading">باردەکرێت...</div>
            
            <div id="checkInInfo" class="arrival-badge">
                <i class="fas fa-sign-in-alt"></i> <span data-i18n="arrival">هاتن</span>: <span id="arrivalTime">--:--</span>
            </div>
        </div>

        <div class="location-card-mini" id="locationBox">
            <div class="verification-grid">
                <div id="deviceVerify" class="verify-item">
                    <div class="item-header">
                        <i class="fas fa-mobile-alt main-icon"></i>
                        <span class="item-title" data-i18n="device">ئامێر</span>
                    </div>
                    <div class="status-message">
                        <span class="status-text" data-i18n="verifying">پشکنین...</span>
                        <span class="status-icon"><i class="fas fa-circle-notch fa-spin"></i></span>
                    </div>
                </div>
                <div id="locationVerify" class="verify-item">
                    <div class="item-header">
                        <i class="fas fa-map-marker-alt main-icon"></i>
                        <span class="item-title" data-i18n="location">لۆکەیشن</span>
                    </div>
                    <div class="status-message">
                        <span class="status-text" data-i18n="verifying">پشکنین...</span>
                        <span class="status-icon"><i class="fas fa-circle-notch fa-spin"></i></span>
                    </div>
                </div>
            </div>
            <div id="accuracyArea"></div>
            <button id="refreshLocBtn" onclick="manualRefreshLocation()" data-i18n="retryBtn">
                <i class="fas fa-sync-alt"></i> دووبارە پشکنین
            </button>
        </div>

        <button class="checkin-btn" id="checkinBtn" disabled onclick="askConfirmation('in')">
            <i class="fas fa-fingerprint"></i>
            <span id="checkinText" data-i18n="checkin">ئامادەبووم</span>
        </button>

        <button class="checkin-btn checkout-active" id="checkoutBtn" onclick="askConfirmation('out')">
             <i class="fas fa-fingerprint"></i> <span data-i18n="checkout">تۆمارکردنی دەرچوون</span>
        </button>

        <div id="error-msg"></div>

        <button class="checkin-btn history-btn" id="calendarToggleBtn" onclick="toggleCalendar()">
            <i class="fas fa-calendar-alt"></i> <span data-i18n="history">مێژووی هاتن و دەرچوونەکانت</span>
        </button>

        <div id="calendarWrapper">
            <div class="calendar-container">
                <div class="calendar-header">
                    <button onclick="changeMonth(-1)" class="icon-btn calendar-nav-btn">❮</button>
                    <h3 id="monthDisplay" data-i18n="month">مانگ</h3>
                    <button onclick="changeMonth(1)" class="icon-btn calendar-nav-btn">❯</button>
                </div>
                <div class="calendar-grid" id="calendarGrid"></div>
            </div>
        </div>
        </div>
    </div>

    <!-- Confirmation Modal -->
    <div id="confirmModal" class="modal-overlay">
        <div class="modal-window confirm-modal-window">
            <div class="modal-icon">
                <i class="fas fa-question-circle"></i>
            </div>
            <h3 id="confirmTitle" data-i18n="confirmTitle">دڵنیایت؟</h3>
            <p id="confirmMsg" data-i18n="confirmMsg">ئایا دەتەوێت ئەم کردارە ئەنجام بدەیت؟</p>
            <div class="confirm-btn-group">
                <button onclick="closeConfirm()" class="checkin-btn btn-secondary" data-i18n="no">نەخێر</button>
                <button id="executeBtn" onclick="executeConfirmedAction()" class="checkin-btn btn-confirm" data-i18n="yes">
                    بەڵێ، دڵنیام
                </button>
            </div>
        </div>
    </div>

    <div id="dayDetails" class="modal-overlay" onclick="closeModal(event)">
        <div class="modal-window update-card">
            <div class="update-header history-header">
                <div class="update-icon-wrapper">
                    <i class="fas fa-calendar-day"></i>
                </div>
            </div>
            <div class="update-body">
                <h4 id="detailDate">ڕێکەوت</h4>
                <div id="detailContent">
                    <div id="detailIn" class="detail-text"></div>
                    <div id="detailOut" class="detail-text"></div>
                </div>
                
                <div id="justificationSection" class="justification-area">
                    <label for="justificationInput" data-i18n="justification">ڕوونکردنەوە</label>
                    <textarea id="justificationInput" class="justification-input" data-i18n="justificationPlaceholder" placeholder="..."></textarea>
                    <div class="justification-controls">
                        <button id="saveJustBtn" class="login-btn history-btn" onclick="submitJustification()" data-i18n="saveJustification" title="Save">
                            <i class="fas fa-paper-plane"></i> <span data-i18n="saveJustification">ناردنی ڕوونکردنەوە</span>
                        </button>
                        <button id="deleteJustBtn" class="login-btn btn-delete" onclick="deleteJustification()" data-i18n="deleteJustification" title="Delete">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </div>
                </div>

                <button onclick="document.getElementById('dayDetails').style.display='none'" class="login-btn">
                    <span data-i18n="close">داخستن</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Update Modal -->
    <div id="updateModal" class="modal-overlay">
        <div class="modal-window update-card">
            <div class="update-header">
                <div class="update-icon-wrapper">
                    <i class="fas fa-wand-magic-sparkles fa-beat-low"></i>
                </div>
            </div>
            <div class="update-body">
                <h3 data-i18n="updateTitle">وەشانی نوێ</h3>
                <p data-i18n="updateMsg"></p>
                <button class="login-btn update-btn" onclick="forceUpdateApp()">
                    <i class="fas fa-bolt"></i> <span data-i18n="updateBtn">نوێکردنەوە</span>
                </button>
            </div>
        </div>
    </div>
     <!-- Modern PWA Install Prompt -->
    <div id="pwaBanner" class="pwa-banner">
        <div class="pwa-handle"></div>
        <button class="pwa-close-btn" onclick="hidePwaPrompt()" aria-label="Close" data-i18n="close"><i class="fas fa-times"></i></button>
        <div class="pwa-content">
            <img src="assets/icon.png" class="pwa-icon" alt="App Icon">
            <div class="pwa-text">
                <h4 data-i18n="pwaTitle">ئەپەکە دابەزێنە</h4>
                <p data-i18n="pwaDesc"></p>
            </div>
        </div>
        <button id="pwaInstallBtn" class="login-btn pwa-install-btn">
            <i class="fas fa-download"></i> <span data-i18n="pwaInstall">دابەزاندن</span>
        </button>
        <div id="pwaIosHint" class="pwa-ios-hint" data-i18n="pwaIOSMsg"></div>
    </div>

    <div class="top-controls justify-end">
        <div class="top-control-group">
            <button class="icon-btn settings-toggle-btn" onclick="navigateToSettings()" id="settingsBtn" title="Settings" data-i18n="empSettings" aria-label="Settings">
                <i class="fas fa-gear"></i>
            </button>
            <button class="icon-btn theme-toggle-btn" onclick="toggleTheme()" id="themeBtn" title="Change Theme" data-i18n="changeTheme" aria-label="Change Theme"><i class="fas fa-sun"></i></button>
        </div>
    </div>

    <script src="lang.js"></script>
    <script src="dashboard.js"></script>
    <script src="script.js"></script>
    <script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js');
  }
</script>
</body>
</html>
