<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ڕێکخستنەکان | IHEC</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@300;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="settings.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="settings-page">
    <div class="top-controls">
        <button class="icon-btn back-btn" onclick="goBackToDashboard()" data-i18n="close" title="Back">
            <i class="fas fa-arrow-right"></i>
        </button>
        <div class="top-control-group">
            <button class="icon-btn theme-toggle-btn" onclick="toggleTheme()" id="themeBtn" title="Change Theme" data-i18n="changeTheme" aria-label="Change Theme"><i class="fas fa-sun"></i></button>
        </div>
    </div>

    <!-- شاردنەوەی ناوەڕۆک تا پشکنینی ناسنامە تەواو دەبێت -->
    <div class="settings-container" id="settingsContent">
        <!-- Modern Header Card -->
        <div class="glass-card profile-header-card">
            <div class="header-main-content">
                <div class="logo-container">
                    <img src="assets/icon.png" alt="Logo" class="app-logo-img">
                    <div class="status-dot"></div>
                </div>
                <div class="app-identity">
                    <h1>IHEC Attendance</h1>
                    <div class="version-badge">
                        <i class="fas fa-circle-check version-icon"></i>
                        <span data-i18n="versionLabel">وەشان</span>
                        <span id="appVersion">v1.1.38</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Language Selection Card -->
        <div class="glass-card section-card compact-card">
            <h3 class="section-title"><i class="fas fa-language"></i> <span data-i18n="languageSection">زمان (Language)</span></h3>
            <div class="lang-selector-grid">
                <button class="lang-option-btn" onclick="setLang('ku')" id="langKu">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/35/Flag_of_Kurdistan.svg/40px-Flag_of_Kurdistan.svg.png" alt="Ku"> کوردی
                </button>
                <button class="lang-option-btn" onclick="setLang('ar')" id="langAr">
                    <img src="https://flagcdn.com/w40/iq.png" alt="Ar"> العربية
                </button>
            </div>
        </div>

        <!-- Change Password Section -->
        <div class="glass-card section-card compact-card">
            <h3 class="section-title"><i class="fas fa-shield-halved"></i> <span data-i18n="accountSecurity">پاراستنی هەژمار</span></h3>
            
            <div class="input-group">
                <label data-i18n="currentPassword">تێپەڕەوشەی ئێستا (کۆن)</label>
                <div class="input-wrapper">
                    <input type="password" id="oldPassword" placeholder="••••••••" oninput="checkPasswordMatch()">
                    <i class="fas fa-unlock-alt input-icon"></i>
                    <span class="eye-icon" onclick="togglePassVisibility('oldPassword')"><i class="fas fa-eye"></i></span>
                </div>
            </div>

            <div class="input-group">
                <label data-i18n="newPassword">تێپەڕەوشەی نوێ</label>
                <div class="input-wrapper">
                    <input type="password" id="newPassword" placeholder="••••••••" oninput="checkPasswordStrength()">
                    <i class="fas fa-lock input-icon"></i>
                    <span class="eye-icon" onclick="togglePassVisibility('newPassword')"><i class="fas fa-eye"></i></span>
                </div>
                <!-- Strength Meter -->
                <div class="strength-meter">
                    <div id="strengthBar" class="bar"></div>
                </div>
                <span id="strengthText" class="strength-label" data-i18n="weak">لاواز</span>
            </div>

            <div class="input-group">
                <label data-i18n="confirmPassword">دووپاتکردنەوەی تێپەڕەوشە</label>
                <div class="input-wrapper">
                    <input type="password" id="confirmPassword" placeholder="••••••••" oninput="checkPasswordMatch()">
                    <i class="fas fa-check-double input-icon"></i>
                    <span class="eye-icon" onclick="togglePassVisibility('confirmPassword')"><i class="fas fa-eye"></i></span>
                </div>
                <div id="matchFeedback" class="match-feedback">
                    <i class="fas fa-circle-info"></i> <span data-i18n="passNotMatch">هاوتا نییە</span>
                </div>
            </div>

            <button class="login-btn update-action-btn" id="updatePassBtn" onclick="showConfirmModal()" disabled>
                <i class="fas fa-key"></i> <span data-i18n="changePasswordBtn">گۆڕینی تێپەڕەوشە</span>
            </button>
        </div>

        <!-- Password Confirmation Modal -->
        <div id="confirmModal" class="modal-overlay">
            <div class="modal-window confirm-modal-window glass-card">
                <div class="modal-icon-wrapper">
                    <i class="fas fa-shield-check modal-shield-icon"></i>
                </div>
                <h3 data-i18n="confirmTitle" class="confirm-modal-title">دڵنیایت؟</h3>
                <p data-i18n="confirmMsg" class="confirm-modal-msg">ئایا دەتەوێت ئەم کردارە ئەنجام بدەیت؟</p>
                <div class="confirm-btn-group">
                    <button onclick="closeConfirmModal()" class="login-btn btn-no">
                        <span data-i18n="no">نەخێر</span>
                    </button>
                    <button onclick="updatePassword()" class="login-btn btn-yes">
                        <span data-i18n="yes">بەڵێ، دڵنیام</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Logout Action -->
        <div class="glass-card logout-section">
            <button class="logout-action-btn" onclick="handleLogout()">
                <i class="fas fa-right-from-bracket"></i>
                <span data-i18n="logout">چوونە دەرەوە</span>
            </button>
        </div>

        <div class="developer-credit">
        <i class="fas fa-code"></i><span class="dev-name"></span>Erbil Office - IHEC
        </div>
    </div>

    <div id="error-msg" class="status-toast"></div>

    <script src="lang.js"></script>
    <script src="script.js"></script>
    <script src="settings.js"></script>
</body>
</html>
