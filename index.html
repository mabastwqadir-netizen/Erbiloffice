<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IHEC | Erbil Office</title>

    <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<!-- PWA Settings -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="assets/icon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="top-controls">
        <!-- Theme Toggle Icon Only -->
        <button class="theme-toggle-btn" onclick="toggleTheme()" id="themeBtn" title="Change Theme"> <!-- Added id="themeBtn" -->
            <span class="theme-icon">🌙</span>
        </button>

        <!-- Modern Language Dropdown -->
        <div class="lang-dropdown">
            <button class="lang-dropbtn" id="langBtn" onclick="toggleLangDropdown(event)">
                <img src="https://flagcdn.com/w40/iq.png" class="flag-img"> عربي
            </button>
            <div class="lang-dropdown-content">
                <div onclick="setLang('ku')"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/35/Flag_of_Kurdistan.svg/40px-Flag_of_Kurdistan.svg.png" class="flag-img"> کوردی</div>
                <div onclick="setLang('ar')"><img src="https://flagcdn.com/w40/iq.png" class="flag-img"> عربي</div>
            </div>
        </div>
    </div>

    <div class="login-card">
        <div class="logo-box"><img src="assets/icon.png" alt="Company Logo" class="company-logo"></div>
        <h1 data-i18n="title">IHEC</h1>
        <p class="subtitle" data-i18n="subtitle">Erbil Office - ئۆفیسی هەولێر</p>

        <div class="input-group">
            <label data-i18n="emailLabel">ئیمەیڵی فەرمی</label>
            <div class="input-wrapper">
                <input type="email" id="email" placeholder="example@ihec.iq" autocomplete="off" dir="rtl">
                <i class="fas fa-envelope input-icon"></i>
            </div>
        </div>

        <div class="input-group">
            <label data-i18n="passLabel">تێپەڕەوشە (پاسوۆرد)</label>
            <div class="input-wrapper">
                <input type="password" id="password" placeholder="••••••••" dir="rtl">
                <i class="fas fa-lock input-icon"></i>
                <span class="eye-icon" onclick="togglePassword()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
                        <path d="M10.5 8a2.5 2.5 0 1 1-5 0 2.5 2.5 0 0 1 5 0z" />
                        <path d="M0 8s3-5.5 8-5.5S16 8 16 8s-3 5.5-8 5.5S0 8 0 8zm8 3.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7z" />
                    </svg>
                </span>
            </div>
        </div>

        <button class="login-btn" id="loginBtn" onclick="handleLogin()">
            <div class="spinner" id="loader"></div>
            <span id="btnText" data-i18n="loginBtnText">چوونە ژوورەوە</span>
        </button>

        <div id="error-msg"></div>
    </div>

    <!-- Update Modal -->
    <div id="updateModal" class="modal-overlay" style="display: none;">
        <div class="modal-window update-card">
            <div class="update-header">
                <div class="update-icon-wrapper">
                    <i class="fas fa-wand-magic-sparkles fa-beat-low"></i>
                </div>
            </div>
            <div class="update-body">
                <h3 data-i18n="updateTitle" style="margin-bottom: 12px; font-size: 1.4rem;">وەشانی نوێ</h3>
                <p data-i18n="updateMsg" style="margin-bottom: 25px; font-size: 0.95rem; color: var(--text-sub); line-height: 1.6;"></p>
                <button class="login-btn update-btn" onclick="forceUpdateApp()">
                    <i class="fas fa-bolt"></i> <span data-i18n="updateBtn">نوێکردنەوە</span>
                </button>
            </div>
        </div>
    </div>

       <!-- Modern PWA Install Prompt -->
    <div id="pwaBanner" class="pwa-banner">
        <div class="pwa-handle"></div>
        <button class="pwa-close-btn" onclick="hidePwaPrompt()"><i class="fas fa-times"></i></button>
        <div class="pwa-content">
            <img src="assets/icon.png" class="pwa-icon">
            <div style="flex: 1;">
                <h4 data-i18n="pwaTitle" style="margin-bottom: 4px;">ئەپەکە دابەزێنە</h4>
                <p data-i18n="pwaDesc" style="font-size: 0.8rem; color: var(--text-sub);"></p>
            </div>
        </div>
        <button id="pwaInstallBtn" class="login-btn" style="width: 100%; max-width: 400px;">
            <i class="fas fa-download"></i> <span data-i18n="pwaInstall">دابەزاندن</span>
        </button>
        <div id="pwaIosHint" class="pwa-ios-hint" style="display: none;" data-i18n="pwaIOSMsg"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="lang.js"></script>
    <script src="script.js"></script>
</body>
</html>
