<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IHEC | Erbil Office</title>

    <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<!-- PWA Settings -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="assets/icon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="top-controls">
        <!-- Theme Toggle Icon Only -->
        <button class="theme-toggle-btn" onclick="toggleTheme()" id="themeBtn" title="Change Theme" data-i18n="changeTheme" aria-label="Change Theme"> <!-- Added id="themeBtn" -->
            <i class="fas fa-sun"></i>
        </button>

        <!-- Modern Language Dropdown -->
        <div class="lang-dropdown">
            <button class="lang-dropbtn" onclick="toggleLangDropdown(event)">
                <img id="current-flag" src="https://flagcdn.com/w40/iq.png" class="flag-img" alt="Language Flag"> 
                <span id="current-lang-text">العربية</span>
            </button>
            <div class="lang-dropdown-content">
                <div onclick="setLang('ku')"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/35/Flag_of_Kurdistan.svg/40px-Flag_of_Kurdistan.svg.png" class="flag-img" alt="Kurdish Flag"> کوردی</div>
                <div onclick="setLang('ar')"><img src="https://flagcdn.com/w40/iq.png" class="flag-img" alt="Iraq Flag"> العربية</div>
            </div>
        </div>
    </div>

    <div class="login-card">
        <div class="logo-box"><img src="assets/icon.png" alt="Company Logo" class="company-logo"></div>
        <h1 data-i18n="title">IHEC</h1>
        <p class="subtitle" data-i18n="subtitle">Erbil Office - ئۆفیسی هەولێر</p>

        <div class="input-group">
            <label data-i18n="emailLabel">ئیمەیڵی فەرمی</label>
            <div class="input-wrapper">
                <input type="email" id="email" placeholder="example@ihec.com" autocomplete="off" dir="rtl">
                <i class="fas fa-envelope input-icon"></i>
            </div>
        </div>

        <div class="input-group">
            <label data-i18n="passLabel">تێپەڕەوشە (پاسوۆرد)</label>
            <div class="input-wrapper">
                <input type="password" id="password" placeholder="********" dir="rtl">
                <i class="fas fa-lock input-icon"></i>
                <span class="eye-icon" onclick="togglePassword()" role="button" aria-label="Toggle Password Visibility">
                    <i class="fas fa-eye"></i>
                </span>
            </div>
        </div>

        <button class="login-btn" id="loginBtn" onclick="handleLogin()">
            <span id="btnText" data-i18n="loginBtnText">چوونە ژوورەوە</span>
            <div class="spinner" id="loader"></div>
        </button>

        <div id="error-msg"></div>

        <!-- Developer Credit -->
        <div class="developer-credit">
            <span>{ إِنَّ ٱللَّهَ كَانَ عَلَیۡكُمۡ رَقِیبࣰا }</span><span class="dev-name"></span>
        </div>
        <div class="copyright-text">
            <i class="far fa-copyright"></i> <span class="current-year"></span> <span data-i18n="copyrightText">هەموو مافێك پارێزراوە بۆ ئۆفیسی پارێزگای هەولێر</span>
        </div>
    </div>

    <!-- Update Modal -->
    <div id="updateModal" class="modal-overlay">
        <div class="modal-window update-card">
            <div class="update-header">
                <div class="update-icon-wrapper">
                    <i class="fas fa-wand-magic-sparkles fa-beat-low"></i>
                </div>
            </div>
            <div class="update-body">
                <h3 data-i18n="updateTitle">وەشانی نوێ</h3>
                <p data-i18n="updateMsg"></p>
                <button class="login-btn update-btn" onclick="forceUpdateApp()">
                    <i class="fas fa-bolt"></i> <span data-i18n="updateBtn">نوێکردنەوە</span>
                </button>
            </div>
        </div>
    </div>

       <!-- Modern PWA Install Prompt -->
    <div id="pwaBanner" class="pwa-banner">
        <div class="pwa-handle"></div>
        <button class="pwa-close-btn" onclick="hidePwaPrompt()" aria-label="Close" data-i18n="close"><i class="fas fa-times"></i></button>
        <div class="pwa-content">
            <img src="assets/icon.png" class="pwa-icon" alt="App Icon">
            <div class="pwa-text">
                <h4 data-i18n="pwaTitle">ئەپەکە دابەزێنە</h4>
                <p data-i18n="pwaDesc"></p>
            </div>
        </div>
        <button id="pwaInstallBtn" class="login-btn pwa-install-btn">
            <i class="fas fa-download"></i> <span data-i18n="pwaInstall">دابەزاندن</span>
        </button>
        <div id="pwaIosHint" class="pwa-ios-hint" data-i18n="pwaIOSMsg"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="lang.js"></script>
    <script src="script.js"></script>
</body>
</html>
